<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AdvanxJS — The Agent-Native Framework</title>
        <link rel="icon" type="image/png" href="./assets/favicon.png" />
        <link rel="apple-touch-icon" href="./assets/favicon.png" />
        <meta name="theme-color" content="#F4F1EB" />
        <script>
            (function () {
                var saved = null;
                try { saved = localStorage.getItem("advanx-theme"); } catch (_) {}
                document.documentElement.dataset.theme = saved === "dark" ? "dark" : "light";
            })();
        </script>
        <style>
            :root {
                --ax-bg: #F4F1EB;
                --ax-bg-alt: #ECE7DD;
                --ax-border: rgba(14, 14, 16, 0.08);
                --ax-ink: #0E0E10;
                --ax-muted: #8a847a;
                --ax-brand: #FF4D2E;
                --ax-brand-hover: #E03B1C;
                --ax-brand-soft: rgba(255, 77, 46, 0.12);
                --ax-ring: rgba(255, 77, 46, 0.25);
            }
            :root[data-theme="dark"] {
                --ax-bg: #0E0E10;
                --ax-bg-alt: #1a1a1d;
                --ax-border: rgba(244, 241, 235, 0.08);
                --ax-ink: #F4F1EB;
                --ax-muted: #8a847a;
            }
            html {
                scrollbar-width: thin;
                scrollbar-color: var(--ax-brand) transparent;
            }
            ::-webkit-scrollbar { width: 8px; height: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb {
                background: var(--ax-brand);
                border-radius: 9999px;
                border: 2px solid var(--ax-bg);
            }
            ::-webkit-scrollbar-thumb:hover { background: var(--ax-brand-hover); }
            ::-webkit-scrollbar-corner { background: transparent; }
            html, body { margin: 0; }
            body {
                background: var(--ax-bg);
                color: var(--ax-ink);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            }
            .container { width: 100%; }
            #app > div { display: contents; }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="app"></div>
            <script src="./src/components/navbar/dist/bundle.js"></script>
            <script src="./src/components/hero/dist/bundle.js"></script>
            <script src="./src/components/stats/dist/bundle.js"></script>
            <script src="./src/components/features/dist/bundle.js"></script>
            <script src="./src/components/comparison/dist/bundle.js"></script>
            <script src="./src/components/constitution/dist/bundle.js"></script>
            <script src="./src/components/docs-start/dist/bundle.js"></script>
            <script src="./src/components/waitlist/dist/bundle.js"></script>
            <script src="./src/components/footer/dist/bundle.js"></script>
            <script>
                (function () {
                    if (!window.location.hash) return;
                    var sel = "." + window.location.hash.slice(1);
                    requestAnimationFrame(function () {
                        try { document.querySelector(sel)?.scrollIntoView({ behavior: "smooth" }); } catch (_) {}
                    });
                })();
            </script>
        </div>
    </body>
</html>
