<section class="waitlist">
  <p class="waitlist-label">Early Access</p>
  <h2 class="waitlist-heading">Be the first to build with AdvanxJS.</h2>
  <div class="waitlist-form">
    <input class="waitlist-input" type="email" ax-model="email" placeholder="your@email.com" />
    <button class="waitlist-btn" ax-on:click="submit">Join Waitlist</button>
  </div>
  <p class="waitlist-success" ax-if="joined">You are on the list, Founder!</p>
</section>
