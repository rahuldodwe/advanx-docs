        <script>
            (function () {
                var saved = null;
                try { saved = localStorage.getItem("advanx-theme"); } catch (_) {}
                document.documentElement.dataset.theme = saved === "dark" ? "dark" : "light";
            })();
        </script>
        <style>
            :root {
                --ax-bg: #F4F1EB;
                --ax-bg-alt: #ECE7DD;
                --ax-border: rgba(14, 14, 16, 0.08);
                --ax-ink: #0E0E10;
                --ax-muted: #8a847a;
                --ax-brand: #FF4D2E;
                --ax-brand-hover: #E03B1C;
                --ax-brand-soft: rgba(255, 77, 46, 0.12);
                --ax-ring: rgba(255, 77, 46, 0.25);
            }
            :root[data-theme="dark"] {
                --ax-bg: #0E0E10;
                --ax-bg-alt: #1a1a1d;
                --ax-border: rgba(244, 241, 235, 0.08);
                --ax-ink: #F4F1EB;
                --ax-muted: #8a847a;
            }
            html {
                scrollbar-width: thin;
                scrollbar-color: var(--ax-brand) transparent;
            }
            ::-webkit-scrollbar { width: 8px; height: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb {
                background: var(--ax-brand);
                border-radius: 9999px;
                border: 2px solid var(--ax-bg);
            }
            ::-webkit-scrollbar-thumb:hover { background: var(--ax-brand-hover); }
            ::-webkit-scrollbar-corner { background: transparent; }
            html, body { margin: 0; }
            body {
                background: var(--ax-bg);
                color: var(--ax-ink);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            }
            .container { width: 100%; }
            #app > div { display: contents; }
        </style>
    </head>
